<!DOCTYPE html>
<html>
<head>
    <title>Confirm Delete</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #ff6a6a, #ff4757);
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 300px;
            text-align: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        h2 {
            margin-bottom: 15px;
            color: #ff4757;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        .btn {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 8px;
            background: #ff4757;
            color: white;
            cursor: pointer;
        }

        .btn:hover {
            background: #e84118;
        }

        .error {
            color: red;
            font-size: 14px;
        }
    </style>
</head>

<body>

<div class="card">
    <h2>Confirm Delete</h2>

    <form method="POST">
        {% csrf_token %}
        <input type="text" name="username" placeholder="Enter Username">
        <input type="password" name="password" placeholder="Enter Password">

        <button type="submit" class="btn">Delete</button>
    </form>
     <a href="{% url 'Dep' %}">
        <button type="button" class="btn" style="background: gray; margin-top:10px;">
            Cancel
        </button>
    </a>

    {% if message %}
        <p class="error">{{ message }}</p>
    {% endif %}
</div>

</body>
</html>
